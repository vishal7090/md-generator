# From repo root: docker compose -f deploy/docker-compose.yml up --build
# Gateway: http://localhost:8080/  (see /zip-to-md/docs, /pdf-to-md/docs, …)

services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - zip-to-md
      - image-to-md
      - txt-json-xml-to-md
      - word-to-md
      - pdf-to-md
      - ppt-to-md
      - xlsx-to-md

  zip-to-md:
    build:
      context: ../zip-to-md
      dockerfile: Dockerfile.api
    command:
      - uvicorn
      - api.main:app
      - --host
      - "0.0.0.0"
      - --port
      - "8000"
      - --root-path
      - /zip-to-md
      - --proxy-headers
      - --forwarded-allow-ips
      - "*"
    expose:
      - "8000"

  image-to-md:
    build:
      context: ../image-to-md
      dockerfile: Dockerfile.api
    command:
      - uvicorn
      - api.main:app
