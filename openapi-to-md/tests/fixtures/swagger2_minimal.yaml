swagger: "2.0"
info:
  title: "Sample API"
  description: "A minimal Swagger 2.0 specification."
  version: "1.0.0"

host: "api.example.com"
basePath: "/v1"
schemes:
  - "https"

paths:
  /users:
    get:
      summary: "Returns a list of users"
      produces:
        - "application/json"
      responses:
        "200":
          description: "A successful response"
          schema:
            type: "array"
            items:
              $ref: "#/definitions/User"

definitions:
  User:
    type: "object"
    properties:
      id:
        type: "integer"
        format: "int64"
      username:
        type: "string"
